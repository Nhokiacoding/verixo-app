<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Verixo API Connection Test</h1>
    <p>Testing connection to: <strong>https://verixo-api-1.onrender.com/api</strong></p>
    
    <button onclick="testConnection()">Test API Connection</button>
    <button onclick="testLogin()">Test Login</button>
    
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'https://verixo-api-1.onrender.com/api';
        
        function addResult(message, isSuccess = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            results.appendChild(div);
        }
        
        async function testConnection() {
            try {
                addResult('Testing API connection...');
                const response = await fetch('https://verixo-api-1.onrender.com/health');
                
                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ API Connected! Status: ${data.message}`);
                    addResult(`Database: ${data.security.mongodb}`);
                } else {
                    addResult(`❌ API Error: ${response.status} ${response.statusText}`, false);
                }
            } catch (error) {
                addResult(`❌ Connection Failed: ${error.message}`, false);
            }
        }
        
        async function testLogin() {
            try {
                addResult('Testing login endpoint...');
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'wrongpassword'
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 401) {
                    addResult('✅ Login endpoint working (returned expected 401 error)');
                } else {
                    addResult(`Login response: ${response.status} - ${data.message}`);
                }
            } catch (error) {
                addResult(`❌ Login Test Failed: ${error.message}`, false);
            }
        }
        
        // Auto-test on load
        window.onload = () => {
            testConnection();
        };
    </script>
</body>
</html>
